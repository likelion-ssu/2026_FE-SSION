 <!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIKELION SSU</title>
    <style>
        body {
            background-color: #F8F9F5;
        }

        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 0px 1px;
            border-bottom: 1px solid #EAEAEA; 
        }

        .header_container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1400px;
            height: 45.5px;
        }

        .main_logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .main_logo p {
            color: #EC5F2B;
            font-size: 15.4px;
            font-weight: bold;
        }

        .recruit {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .recruit_logo {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: bold;
            font-size: 14px;
            border-bottom: 1px solid black; 
        }
        
        .title {
            padding: 32px 0px;
            text-align: center;
        }

        .title h1 {
            font-size: 50px;
            font-weight: bold;
            margin: 0;
        }

        .title p {
            font-size: 14px;
            margin-bottom: 0;
        }

        .menu {
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #EAEAEA;
        }
        .menu p {
            box-sizing: border-box;
            border: 1px solid #EAEAEA;  
            width: 112px;
            height: 32.91px;;
            padding: 8.96px 10.08px;
            margin: 0;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            line-height: 14px;
            color: rgb(175, 174, 172)
        }

        .content {
            display: grid;
            grid-template-columns: repeat(3, 330px);
            grid-template-rows: repeat(3, 254px);
            grid-template-areas: 
            "box1 box2 box3"
            "box4 box5 box6";
            gap: 40px 60px;
            box-sizing: border-box;
            align-items: center;
            justify-content: center;
        }
        
        .content1 {
            background-color: white;
            grid-area: box1;

        }

        .content2 {
            background-color: white;
            grid-area: box2;
    
        }

        .content3 {
            background-color: white;
            grid-area: box3;

        }

        .content4 {
            background-color: white;
            grid-area: box4;
  
        }

        .content5 {
            background-color: white;
            grid-area: box5;

        }

        .content6 {
            background-color: white;
            grid-area: box6;

        }

        .content img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }


    </style>
</head>
<body>
    <header class="header"> 
        <div class="header_container">
            <div class="main_logo">
                <img src="logo.svg" alt="숭멋사 로고">
                <p>LIKELION SOONGSIL</p>
            </div>

            <div class="recruit">
                <div class="recruit_logo">
                    <img src="recruit.svg" alt="모집 로고">
                    <span>Recruit</span>
                </div>
                <img src="menu.svg" alt="메뉴 아이콘">
            </div>
        </div>
    </header>  
    <main>
        <section class="title">
            <h1>PROJECT</h1>
            <p>멋!사에서 만들어진 아기 사!자의 프로젝트</p>
        </section>

        <section class="menu">
            <p style="color: #EC5F2B; background-color: white;">전체</p>
            <p>아이디어톤</p>
            <p>해커톤</p>
            <p>겨울잠</p>
        </section>

        <section class="content">
            <div class="content1">
                <img src="classiverse-1.webp" alt="클래시버스">
            </div>

            <div class="content2">
              <img src="promptstudio-1.webp" alt="프롬프트스튜디오">
            </div>

            <div class="content3"> 
              <img src="dasoni-1.webp" alt="다소니">
            </div>

            <div class="content4">
              <img src="IDDA-1.webp" alt="이불 밖은 따뜻해">
            </div>

            <div class="content5">
              <img src="shijang-1.webp" alt="시장에가면">
            </div>

            <div class="content6">
              <img src="Pin4U-1.webp" alt="핀포유">
            </div>

        </section>
    </main>
</body>
</html>
