 <!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIKELION SSU - Header</title>
    <style>
        body {
            background-color: #F8F9F5;
        }

        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #EAEAEA; 
        }

        .header_container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1400px;
        }

        .main_logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .main_logo p {
            color: #EC5F2B;
            font-weight: bold;
        }

        .recruit {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .recruit_logo {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: bold;
            border-bottom: 1px solid black; 
        }


    </style>
</head>
<body>
    <header class="header"> 
        <div class="header_container">
            <div class="main_logo">
                <img src="logo.svg" alt="숭멋사 로고">
                <p>LIKELION SOONGSIL</p>
            </div>

            <div class="recruit">
                <div class="recruit_logo">
                    <img src="recruit.svg" alt="모집 로고">
                    <span>Recruit</span>
                </div>
                <img src="menu.svg" alt="메뉴 아이콘">
            </div>
        </div>
    </header>  
</body>
</html>
